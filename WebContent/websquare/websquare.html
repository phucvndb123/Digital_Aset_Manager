		<title>	WebSquare </title>
		<script type="text/javascript">
			(function () {
				var baseURI = "/websquare/";
				window.WebSquareExternal = window.WebSquareExternal || {};
				window.WebSquareExternal.baseURI = baseURI;
				window.WebSquareExternal.baseServletURI = baseURI;
				window.WebSquareExternal._mode = "dev";
				window.WebSquareExternal.w2xPath = "";
				try {
					var p = new URLSearchParams(location.search).get("w2xPath");
					if (p) window.WebSquareExternal.w2xPath = p;
				} catch (e) {}
				window.WebSquare = window.WebSquare || {};
				window.WebSquare.baseURI = baseURI;
				window.WebSquare.baseServletURI = baseURI;
				window.WebSquare.configPath = baseURI + "config.js";
			})();
		</script>
